[autoexec]
@echo off
mount C C:\Users\valen\Desktop\LyC\lyc2025_grupo04
C:
cls
echo ================================================
echo   Compilador LYC 2025 - Grupo 04
echo ================================================
echo.
echo Limpiando artefactos previos...
if exist final.obj del final.obj
if exist final.exe del final.exe
if exist final.map del final.map
echo.
echo Compilando con TASM...
asm\TASM\tasm final.asm
if errorlevel 1 goto error
echo.
echo Linkeando con TLINK...
asm\TASM\tlink final.obj
if errorlevel 1 goto error
echo.
echo ================================================
echo Ejecutando programa...
echo ================================================
echo.
final.exe
echo.
echo ================================================
echo Programa finalizado. Presiona cualquier tecla...
echo ================================================
pause > nul
exit
:error
echo.
echo *** ERROR en compilacion ***
echo.
pause
exit
